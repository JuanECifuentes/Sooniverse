<script>
// Fuerza al navegador a recordar la posición al recargar (restauración por defecto)
if ('scrollRestoration' in history) {
  history.scrollRestoration = 'auto';
}

function scrollToPageTop() {
  const target = document.getElementById('page-top') || document.documentElement;
  const header = document.querySelector('header');
  const headerHeight = header ? header.offsetHeight : 0;
  
  let targetY = 0;
  if (target && target !== document.documentElement) {
    targetY = Math.max(0, target.getBoundingClientRect().top + window.scrollY - headerHeight - 16);
  }
  
  const startY = window.scrollY;
  const distance = targetY - startY;
  
  // Si ya estamos en la posición objetivo, no hace falta animar
  if (Math.abs(distance) < 5) return;
  
  const duration = 1000; // Duración de la animación (1 segundo)
  let startTime = null;
  
  function easeInOutCubic(t, b, c, d) {
    t /= d / 2;
    if (t < 1) return c / 2 * t * t * t + b;
    t -= 2;
    return c / 2 * (t * t * t + 2) + b;
  }
  
  function step(currentTime) {
    if (startTime === null) startTime = currentTime;
    const elapsed = currentTime - startTime;
    const progress = easeInOutCubic(elapsed, startY, distance, duration);
    window.scrollTo(0, progress);
    if (elapsed < duration) {
      requestAnimationFrame(step);
    } else {
      window.scrollTo(0, targetY);
    }
  }
  requestAnimationFrame(step);
}

// Llama al scroll suave al inicio tras un breve retardo para que actúe la restauración del navegador
setTimeout(scrollToPageTop, 150);
</script>
