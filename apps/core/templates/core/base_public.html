{% load static %}
<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Sooniverse | Diagnóstico Técnico{% endblock %}</title>
    <link rel="icon" type="image/png" sizes="192x192" href="{% static 'icons/icon-192x192.png' %}">
    <link rel="apple-touch-icon" href="{% static 'icons/icon-192x192.png' %}">
    <meta name="robots" content="noindex, nofollow">

    <link href="{% static 'css/dist/tailwind.css' %}" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    {% block extra_head %}{% endblock %}

    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #070A12; color: #FFFFFF; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .noise-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.018;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
        .text-cosmic { background: linear-gradient(135deg, #00FF87 0%, #60EFFF 50%, #8A2BE2 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #00FF87 0%, #60EFFF 50%, #8A2BE2 100%); transition: transform 0.3s ease, filter 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); filter: drop-shadow(0 0 12px rgba(0, 255, 135, 0.6)); }
        .btn-secondary { border: 1.5px solid #60EFFF; background: transparent; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 0 16px rgba(96, 239, 255, 0.45); }
        .card { background-color: #0F172A; border: 1px solid #1E293B; border-radius: 12px; }
        .glow-cyan { filter: drop-shadow(0 0 12px rgba(96,239,255,0.6)); }

        input:disabled, select:disabled, textarea:disabled { opacity: 0.55; cursor: not-allowed; }

        .has-tooltip { position: relative; display: inline-flex; align-items: center; }
        .tooltip {
            position: absolute;
            bottom: calc(100% + 0.5rem);
            left: 50%;
            transform: translateX(-50%);
            width: max-content;
            max-width: 18rem;
            padding: 0.625rem 0.875rem;
            border-radius: 0.5rem;
            background-color: #0F172A;
            border: 1px solid #1E293B;
            color: #FFFFFF;
            font-size: 0.75rem;
            line-height: 1.35rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
            z-index: 100;
            pointer-events: none;
        }
        .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px;
            border-style: solid;
            border-color: #1E293B transparent transparent transparent;
        }
        .has-tooltip:hover .tooltip,
        .has-tooltip:focus-within .tooltip { opacity: 1; visibility: visible; }
    </style>
</head>
<body class="min-h-screen bg-deep text-white antialiased">
    <div class="noise-overlay"></div>

    <header class="border-b border-border bg-surface/80 backdrop-blur-xl sticky top-0 z-30">
        <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <img src="{% static 'logos_v1/logo_completo_sin_fondo_soloNombre2.svg' %}" alt="Sooniverse" class="h-8 w-auto">
            </a>
            <span class="font-mono text-[10px] uppercase tracking-brand text-neon">Diagnóstico Técnico</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12">
        {% block content %}{% endblock %}
    </main>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
