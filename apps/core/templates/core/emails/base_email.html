<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #070A12; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #94A3B8; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #070A12; table-layout: fixed; min-height: 100vh;">
        <tr>
            <td align="center" style="padding: 40px 10px;">
                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #0F172A; border: 1px solid #1E293B; border-radius: 12px; overflow: hidden; max-width: 600px; box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.5);">
                    
                    <!-- HEADER -->
                    <tr>
                        <td align="center" style="padding: 40px 30px 30px 30px; border-bottom: 1px solid #1E293B; background-color: #0c1220;">
                            <span style="font-size: 32px; font-weight: 800; letter-spacing: -1px; text-decoration: none; display: inline-block;">
                                <span style="color: #FFFFFF;">Sooni</span><span style="color: #00FF87;">verse</span>
                            </span>
                            <div style="font-family: 'JetBrains Mono', 'Fira Code', monospace, Courier; font-size: 10px; font-weight: 700; color: #00FF87; letter-spacing: 6.5px; text-transform: uppercase; margin-top: 8px;">
                                ADVANCED TECH UNIVERSE
                            </div>
                        </td>
                    </tr>
                    
                    <!-- CONTENT -->
                    <tr>
                        <td style="padding: 40px 40px 30px 40px; background-color: #0F172A;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>
                    
                    <!-- FOOTER -->
                    <tr>
                        <td align="center" style="padding: 35px 40px 35px 40px; border-top: 1px solid #1E293B; font-size: 11px; color: #64748B; background-color: #0c1220; line-height: 1.5;">
                            <p style="margin: 0 0 8px 0; font-family: 'JetBrains Mono', monospace;">SOONIVERSE SECURE CHANNEL // AUTO-GENERATED DISPATCH</p>
                            <p style="margin: 0;">&copy; 2026 Sooniverse. Todos los derechos reservados. Cumplimiento RGPD y políticas de privacidad empresariales.</p>
                        </td>
                    </tr>
                    
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
