<svg xmlns="http://www.w3.org/2000/svg" version="1.2" baseProfile="tiny-ps" viewBox="-140 -140 280 280" width="280" height="280">
  <!-- Fondo Oscuro de Marca -->
  <rect x="-140" y="-140" width="280" height="280" fill="#070A12"/>
  
  <defs>
    <linearGradient id="cosmicGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF87" />
      <stop offset="50%" stop-color="#60EFFF" />
      <stop offset="100%" stop-color="#8A2BE2" />
    </linearGradient>
    <linearGradient id="planetGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="45%" stop-color="#4C1D95" />
      <stop offset="100%" stop-color="#1E1B4B" />
    </linearGradient>
  </defs>

  <!-- Sistema Planetario Centrado en 0,0 -->
  <g>
    <!-- Anillos Traseros -->
    <g transform="rotate(-18)">
      <path d="M -68,0 A 68,19 0 0,1 68,0" fill="none" stroke="url(#cosmicGrad1)" stroke-width="2.5" opacity="0.35"/>
      <path d="M -92,0 A 92,26 0 0,1 92,0" fill="none" stroke="url(#cosmicGrad1)" stroke-width="11" opacity="0.4"/>
      <path d="M -92,0 A 92,26 0 0,1 92,0" fill="none" stroke="#60EFFF" stroke-width="2" opacity="0.6"/>
      <path d="M -114,0 A 114,32 0 0,1 114,0" fill="none" stroke="url(#cosmicGrad1)" stroke-width="3.5" opacity="0.3"/>
    </g>

    <!-- Cuerpo Celeste -->
    <circle cx="0" cy="0" r="46" fill="url(#planetGrad1)" stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.5"/>
    <path d="M -40,-22 Q 0,-10 40,-22" fill="none" stroke="#60EFFF" stroke-width="1.5" stroke-opacity="0.4"/>
    <path d="M -45,12 Q 0,26 45,12" fill="none" stroke="#00FF87" stroke-width="1.5" stroke-opacity="0.5"/>
    <path d="M -46,0 Q 0,14 46,0" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="4,3"/>

    <!-- Anillos Delanteros -->
    <g transform="rotate(-18)">
      <path d="M 68,0 A 68,19 0 0,1 -68,0" fill="none" stroke="url(#cosmicGrad1)" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M 92,0 A 92,26 0 0,1 -92,0" fill="none" stroke="url(#cosmicGrad1)" stroke-width="11" stroke-linecap="round"/>
      <path d="M 92,0 A 92,26 0 0,1 -92,0" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.85" stroke-linecap="round"/>
      <path d="M 114,0 A 114,32 0 0,1 -114,0" fill="none" stroke="url(#cosmicGrad1)" stroke-width="3.5" stroke-linecap="round"/>
    </g>

    <!-- Nodos Activos (Efecto Glow Simulado Nativo para Compatibilidad BIMI) -->
    <!-- Nodo Verde -->
    <circle cx="-80" cy="-45" r="16" fill="#00FF87" opacity="0.15"/>
    <circle cx="-80" cy="-45" r="11" fill="#00FF87" opacity="0.4"/>
    <circle cx="-80" cy="-45" r="9" fill="#00FF87"/>
    <circle cx="-80" cy="-45" r="4" fill="#FFFFFF"/>
    
    <!-- Nodo Azul -->
    <circle cx="104" cy="12" r="14" fill="#60EFFF" opacity="0.15"/>
    <circle cx="104" cy="12" r="10" fill="#60EFFF" opacity="0.4"/>
    <circle cx="104" cy="12" r="7.5" fill="#60EFFF"/>
    
    <!-- Nodo Morado -->
    <circle cx="15" cy="58" r="15" fill="#8A2BE2" opacity="0.15"/>
    <circle cx="15" cy="58" r="11" fill="#8A2BE2" opacity="0.4"/>
    <circle cx="15" cy="58" r="8.5" fill="#8A2BE2"/>
    <circle cx="15" cy="58" r="3" fill="#60EFFF"/>
  </g>
<title>Sooniverse</title></svg>
